<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1B3A5C">
  <title>Infusjonsdagbok SCIG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1B3A5C;
      --teal: #008091;
      --red: #E8192C;
      --bg: #F2F4F7;
      --card: #FFFFFF;
      --border: rgba(0,0,0,0.1);
      --text: #1a1a1a;
      --muted: #6b7280;
      --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; height: 100dvh; overflow: hidden; background: var(--navy); }
    body {
      font-family: var(--font);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #app {
      width: 100%;
      max-width: 430px;
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
      position: relative;
    }

    /* ── Brand header ── */
    #brand-header {
      background: var(--navy);
      padding: 10px 16px 10px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      padding-top: max(10px, env(safe-area-inset-top));
    }
    .brand-title { color: #fff; font-size: 14px; font-weight: 600; line-height: 1.2; }
    .brand-sub { color: rgba(255,255,255,0.55); font-size: 11px; margin-top: 2px; }
    .brand-badge {
      margin-left: auto;
      background: var(--red);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    /* ── Content area ── */
    #content { flex: 1; overflow: hidden; position: relative; }

    /* ── Views ── */
    .view {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }
    .view.active { opacity: 1; pointer-events: all; }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--border);
      background: var(--card);
      flex-shrink: 0;
    }
    .top-bar h1 { font-size: 16px; font-weight: 600; color: var(--text); }
    .top-bar-side { width: 40px; display: flex; align-items: center; }
    .top-bar-side.right { justify-content: flex-end; }

    /* ── Scroll area ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 14px 16px 24px;
    }

    /* ── Bottom action ── */
    .bottom-action {
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      background: var(--card);
      border-top: 0.5px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Buttons ── */
    button { font-family: var(--font); }
    .btn-primary {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 14px;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary.teal { background: var(--teal); color: #fff; }
    .btn-primary.navy { background: var(--navy); color: #fff; }
    .btn-primary.green { background: #4caf50; color: #fff; }
    .btn-primary:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; transform: none; }
    .btn-new {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 14px;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-new:active { opacity: 0.8; }
    .btn-new.teal { background: var(--teal); color: #fff; }
    .btn-new.navy { background: var(--navy); color: #fff; }
    .btn-export {
      background: none; border: none; cursor: pointer;
      padding: 4px; display: flex; align-items: center;
      border-radius: 6px; color: var(--teal);
      transition: opacity 0.15s;
    }
    .btn-export:active { opacity: 0.6; }
    .btn-back, .btn-delete {
      background: none; border: none; cursor: pointer;
      padding: 4px; display: flex; align-items: center;
      border-radius: 6px;
      transition: opacity 0.15s;
    }
    .btn-back:active, .btn-delete:active { opacity: 0.6; }
    .btn-back { color: var(--teal); }
    .btn-delete { color: var(--red); }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: 12px;
      border: 0.5px solid var(--border);
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    /* ── Info rows ── */
    .info-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 8px 0;
      border-bottom: 0.5px solid rgba(0,0,0,0.07);
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; padding-bottom: 0; }
    .info-row .lbl { color: var(--muted); flex-shrink: 0; margin-right: 12px; font-size: 13px; }
    .info-row .val { text-align: right; color: var(--text); font-weight: 500; }

    /* ── Form fields ── */
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 11px; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 5px;
    }
    .field input, .field textarea {
      width: 100%; padding: 11px 12px;
      font-family: var(--font);
      font-size: 16px; /* prevents iOS zoom */
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 9px;
      background: #fff;
      color: var(--text);
      outline: none;
      -webkit-appearance: none; appearance: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field textarea:focus { border-color: var(--teal); }
    .field textarea { resize: none; line-height: 1.55; }

    /* ── Dose row ── */
    .dose-row { display: flex; gap: 8px; align-items: stretch; }
    .dose-row input { flex: 1; }
    .unit-toggle {
      display: flex;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 9px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .unit-btn {
      padding: 11px 16px;
      font-family: var(--font);
      font-size: 14px; font-weight: 600;
      border: none; cursor: pointer;
      background: #fff; color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .unit-btn.active { background: var(--teal); color: #fff; }

    /* ── 2-col grid ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ── List items ── */
    .list-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; margin-bottom: 8px;
      background: var(--card);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer; width: 100%; text-align: left;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .list-item:active { transform: scale(0.99); }
    .item-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .item-sub { font-size: 13px; color: var(--muted); }
    .item-right { display: flex; align-items: center; gap: 8px; }

    /* ── Empty state ── */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 200px; padding: 32px 24px; text-align: center;
    }
    .empty-icon { font-size: 42px; opacity: 0.22; margin-bottom: 14px; }
    .empty-text { font-size: 14px; color: var(--muted); line-height: 1.65; }

    /* ── Section title ── */
    .sec-title {
      font-size: 11px; font-weight: 700;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.09em;
      margin-bottom: 8px; margin-top: 6px;
    }

    /* ── Bivirkning badge ── */
    .biv-header {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 8px;
    }
    .biv-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
    }
    .detail-body { font-size: 14px; line-height: 1.65; color: var(--text); }
    .detail-sec-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 8px;
    }

    /* ── Bottom nav ── */
    #bottom-nav {
      display: flex;
      border-top: 0.5px solid var(--border);
      background: var(--card);
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 9px 0 10px;
      border: none; background: none; cursor: pointer;
      color: var(--muted); gap: 2px;
      transition: color 0.15s;
    }
    .nav-btn.active { color: var(--teal); }
    .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.8; }
    .nav-btn span { font-size: 11px; font-weight: 500; font-family: var(--font); }
  </style>
</head>
<body>
<div id="app">
  <div id="brand-header">
    <div>
      <div class="brand-title">Infusjonsdagbok</div>
      <div class="brand-sub">Subkutan immunglobulinbehandling</div>
    </div>
    <div class="brand-badge">SCIG</div>
  </div>

  <div id="content"></div>

  <nav id="bottom-nav">
    <button class="nav-btn" data-tab="info" onclick="switchTab('info')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0112 0v2"/></svg>
      <span>Info</span>
    </button>
    <button class="nav-btn" data-tab="klinikk" onclick="switchTab('klinikk')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M10 22V12h4v10"/></svg>
      <span>Besøk</span>
    </button>
    <button class="nav-btn" data-tab="logg" onclick="switchTab('logg')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      <span>Logbok</span>
    </button>
  </nav>
</div>

<script>
// ─── Utilities ───
const today = () => new Date().toISOString().split('T')[0];
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const fmtDate = s => {
  if (!s) return '—';
  return new Date(s + 'T12:00:00').toLocaleDateString('nb-NO', { day: '2-digit', month: '2-digit', year: 'numeric' });
};
const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ─── Storage ───
const store = {
  get: (k, def) => { try { return JSON.parse(localStorage.getItem(k)) ?? def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { console.warn(e); } }
};

// ─── State ───
const S = {
  tab: 'logg',
  loggView: 'list', loggSel: null,
  klinikkView: 'list', klinikkSel: null,
  lf: { dato: today(), dose: '', enhet: 'g', lot: '', bivirkninger: '', annet: '' },
  kf: { dato: today(), kl: '', kontakt: '', anmerkning: '' },
  entries: store.get('infdag-entries', []),
  visits:  store.get('infdag-visits',  []),
  patient: store.get('infdag-patient', { navn: '', personnummer: '', ar: '' }),
  contacts:store.get('infdag-contacts',{ lege: '', sykepleier: '' }),
  diag:    store.get('infdag-diag',    { diagnose: '', doseG: '', doseIntervall: '', doseMl: '', dosePerSted: '', andreLeg: '', overfol: '', annet: '' }),
};

// ─── SVG Icons ───
const IC = {
  back:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px"><polyline points="15,18 9,12 15,6"/></svg>`,
  trash:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:20px;height:20px"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>`,
  chevron: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;opacity:0.3"><polyline points="9,18 15,12 9,6"/></svg>`,
  warn:    `<svg viewBox="0 0 24 24" fill="none" stroke="#E8192C" stroke-width="2" style="width:15px;height:15px"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  plus:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
};

// ─── View renderers ───
function vLoggList() {
  const items = S.entries.length === 0
    ? `<div class="empty-state"><div class="empty-icon">💉</div><div class="empty-text">Ingen registreringer ennå.<br>Trykk «Ny» for å registrere din første infusjon.</div></div>`
    : S.entries.map(e => `
      <button class="list-item" onclick="openLoggDetail('${e.id}')">
        <div>
          <div class="item-title">${fmtDate(e.dato)}</div>
          <div class="item-sub">${esc(e.dose)} ${esc(e.enhet)} · LOT: ${esc(e.lot) || '—'}</div>
        </div>
        <div class="item-right">${e.bivirkninger ? IC.warn : ''}${IC.chevron}</div>
      </button>`).join('');
  return `
    <div class="top-bar">
      <div class="top-bar-side"></div>
      <h1>Logbok</h1>
      <div class="top-bar-side right"><button class="btn-new teal" onclick="goLogg('new')">${IC.plus} Ny</button></div>
    </div>
    <div class="scroll-area">${items}</div>`;
}

function vLoggNew() {
  const f = S.lf;
  const ok = f.dato && f.dose;
  return `
    <div class="top-bar">
      <div class="top-bar-side"><button class="btn-back" onclick="goLogg('list')">${IC.back}</button></div>
      <h1>Ny infusjon</h1>
      <div class="top-bar-side"></div>
    </div>
    <div class="scroll-area">
      <div class="field"><label>Dato</label>
        <input type="date" value="${esc(f.dato)}" onchange="lf('dato',this.value)">
      </div>
      <div class="field"><label>Dose</label>
        <div class="dose-row">
          <input type="number" step="0.1" value="${esc(f.dose)}" placeholder="0.0" oninput="lf('dose',this.value)">
          <div class="unit-toggle">
            <button class="unit-btn${f.enhet==='g'?' active':''}" onclick="setEnhet('g')">g</button>
            <button class="unit-btn${f.enhet==='ml'?' active':''}" onclick="setEnhet('ml')">ml</button>
          </div>
        </div>
      </div>
      <div class="field"><label>Batchnr. (LOT)</label>
        <input type="text" value="${esc(f.lot)}" placeholder="LOT-nummer" oninput="lf('lot',this.value)">
      </div>
      <div class="field"><label>Eventuelle bivirkninger</label>
        <textarea rows="3" placeholder="Beskriv eventuelle bivirkninger …" oninput="lf('bivirkninger',this.value)">${esc(f.bivirkninger)}</textarea>
      </div>
      <div class="field"><label>Annet</label>
        <textarea rows="2" oninput="lf('annet',this.value)">${esc(f.annet)}</textarea>
      </div>
    </div>
    <div class="bottom-action">
      <button class="btn-primary teal" onclick="saveEntry()" ${ok?'':'disabled'}>Lagre registrering</button>
    </div>`;
}

function vLoggDetail() {
  const e = S.loggSel; if (!e) return '';
  return `
    <div class="top-bar">
      <div class="top-bar-side"><button class="btn-back" onclick="goLogg('list')">${IC.back}</button></div>
      <h1>${fmtDate(e.dato)}</h1>
      <div class="top-bar-side right"><button class="btn-delete" onclick="delEntry('${e.id}')">${IC.trash}</button></div>
    </div>
    <div class="scroll-area">
      <div class="card">
        <div class="info-row"><span class="lbl">Dato</span><span class="val">${fmtDate(e.dato)}</span></div>
        <div class="info-row"><span class="lbl">Dose</span><span class="val">${esc(e.dose)} ${esc(e.enhet)}</span></div>
        <div class="info-row"><span class="lbl">Batchnr. (LOT)</span><span class="val">${esc(e.lot)||'—'}</span></div>
      </div>
      ${e.bivirkninger ? `<div class="card"><div class="biv-header">${IC.warn}<span class="biv-label">Bivirkninger</span></div><p class="detail-body">${esc(e.bivirkninger)}</p></div>` : ''}
      ${e.annet ? `<div class="card"><div class="detail-sec-label">Annet</div><p class="detail-body">${esc(e.annet)}</p></div>` : ''}
    </div>`;
}

function vKlinikkList() {
  const items = S.visits.length === 0
    ? `<div class="empty-state"><div class="empty-icon">🏥</div><div class="empty-text">Ingen klinikkbesøk registrert ennå.</div></div>`
    : S.visits.map(v => `
      <button class="list-item" onclick="openKlinikkDetail('${v.id}')">
        <div>
          <div class="item-title">${fmtDate(v.dato)}${v.kl ? ' kl. '+esc(v.kl) : ''}</div>
          <div class="item-sub">${esc(v.kontakt)||'Kontakt ikke angitt'}</div>
        </div>
        ${IC.chevron}
      </button>`).join('');
  return `
    <div class="top-bar">
      <div class="top-bar-side"></div>
      <h1>Klinikkbesøk</h1>
      <div class="top-bar-side right"><button class="btn-new navy" onclick="goKlinikk('new')">${IC.plus} Ny</button></div>
    </div>
    <div class="scroll-area">${items}</div>`;
}

function vKlinikkNew() {
  const f = S.kf;
  return `
    <div class="top-bar">
      <div class="top-bar-side"><button class="btn-back" onclick="goKlinikk('list')">${IC.back}</button></div>
      <h1>Nytt klinikkbesøk</h1>
      <div class="top-bar-side"></div>
    </div>
    <div class="scroll-area">
      <div class="field"><label>Dato</label>
        <input type="date" value="${esc(f.dato)}" onchange="kf('dato',this.value)">
      </div>
      <div class="field"><label>Klokkeslett</label>
        <input type="time" value="${esc(f.kl)}" oninput="kf('kl',this.value)">
      </div>
      <div class="field"><label>Lege/sykepleier</label>
        <input type="text" value="${esc(f.kontakt)}" placeholder="Navn" oninput="kf('kontakt',this.value)">
      </div>
      <div class="field"><label>Anmerkninger fra besøket</label>
        <textarea rows="4" placeholder="Hva ble avtalt ved besøket?" oninput="kf('anmerkning',this.value)">${esc(f.anmerkning)}</textarea>
      </div>
    </div>
    <div class="bottom-action">
      <button class="btn-primary navy" onclick="saveVisit()" ${f.dato?'':'disabled'}>Lagre besøk</button>
    </div>`;
}

function vKlinikkDetail() {
  const v = S.klinikkSel; if (!v) return '';
  return `
    <div class="top-bar">
      <div class="top-bar-side"><button class="btn-back" onclick="goKlinikk('list')">${IC.back}</button></div>
      <h1>${fmtDate(v.dato)}</h1>
      <div class="top-bar-side right"><button class="btn-delete" onclick="delVisit('${v.id}')">${IC.trash}</button></div>
    </div>
    <div class="scroll-area">
      <div class="card">
        <div class="info-row"><span class="lbl">Dato</span><span class="val">${fmtDate(v.dato)}</span></div>
        <div class="info-row"><span class="lbl">Klokkeslett</span><span class="val">${esc(v.kl)||'—'}</span></div>
        <div class="info-row"><span class="lbl">Lege/sykepleier</span><span class="val">${esc(v.kontakt)||'—'}</span></div>
      </div>
      ${v.anmerkning ? `<div class="card"><div class="detail-sec-label">Anmerkninger</div><p class="detail-body">${esc(v.anmerkning)}</p></div>` : ''}
    </div>`;
}

function vInfo() {
  const p = S.patient, c = S.contacts, d = S.diag;
  return `
    <div class="top-bar">
      <div class="top-bar-side"></div>
      <h1>Pasientinformasjon</h1>
      <div class="top-bar-side right">
        <button class="btn-export" onclick="exportData()" title="Eksporter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:22px;height:22px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
      </div>
    </div>
    <div class="scroll-area">
      <div class="sec-title">Pasient</div>
      <div class="card">
        <div class="field"><label>Navn</label><input type="text" value="${esc(p.navn)}" oninput="upPatient('navn',this.value)"></div>
        <div class="field"><label>Personnummer</label><input type="text" value="${esc(p.personnummer)}" oninput="upPatient('personnummer',this.value)"></div>
        <div class="field"><label>År</label><input type="text" value="${esc(p.ar)}" placeholder="${new Date().getFullYear()}" oninput="upPatient('ar',this.value)"></div>
      </div>
      <div class="sec-title">Kontaktpersoner</div>
      <div class="card">
        <div class="field"><label>Lege</label><input type="text" value="${esc(c.lege)}" oninput="upContacts('lege',this.value)"></div>
        <div class="field"><label>Sykepleier</label><input type="text" value="${esc(c.sykepleier)}" oninput="upContacts('sykepleier',this.value)"></div>
      </div>
      <div class="sec-title">Diagnose og legemiddel</div>
      <div class="card">
        <div class="field"><label>Diagnose</label><input type="text" value="${esc(d.diagnose)}" oninput="upDiag('diagnose',this.value)"></div>
        <div class="grid-2">
          <div class="field"><label>Dose (g)</label><input type="number" value="${esc(d.doseG)}" oninput="upDiag('doseG',this.value)"></div>
          <div class="field"><label>Doseintervall (ant/uke)</label><input type="number" value="${esc(d.doseIntervall)}" oninput="upDiag('doseIntervall',this.value)"></div>
          <div class="field"><label>Dose (ml)</label><input type="number" value="${esc(d.doseMl)}" oninput="upDiag('doseMl',this.value)"></div>
          <div class="field"><label>Dose/inf.sted (ml)</label><input type="number" value="${esc(d.dosePerSted)}" oninput="upDiag('dosePerSted',this.value)"></div>
        </div>
        <div class="field"><label>Andre legemidler</label><textarea rows="2" oninput="upDiag('andreLeg',this.value)">${esc(d.andreLeg)}</textarea></div>
        <div class="field"><label>Overfølsomhet overfor legemidler</label><textarea rows="2" oninput="upDiag('overfol',this.value)">${esc(d.overfol)}</textarea></div>
        <div class="field"><label>Annet</label><textarea rows="2" oninput="upDiag('annet',this.value)">${esc(d.annet)}</textarea></div>
      </div>
    </div>
    <div class="bottom-action">
      <button class="btn-primary navy" id="save-info-btn" onclick="saveInfo()">Lagre</button>
    </div>`;
}

// ─── Render ───
function render() {
  // Nav
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === S.tab));

  const viewMap = {
    'logg-list':      vLoggList(),
    'logg-new':       vLoggNew(),
    'logg-detail':    vLoggDetail(),
    'klinikk-list':   vKlinikkList(),
    'klinikk-new':    vKlinikkNew(),
    'klinikk-detail': vKlinikkDetail(),
    'info':           vInfo(),
  };

  let activeKey = S.tab === 'logg' ? `logg-${S.loggView}`
                : S.tab === 'klinikk' ? `klinikk-${S.klinikkView}`
                : 'info';

  document.getElementById('content').innerHTML =
    Object.entries(viewMap).map(([k, html]) =>
      `<div class="view${k===activeKey?' active':''}" id="v-${k}">${html}</div>`
    ).join('');
}

// ─── Navigation ───
function switchTab(tab) { S.tab = tab; render(); }

function goLogg(view) {
  if (view === 'new') S.lf = { dato: today(), dose: '', enhet: 'g', lot: '', bivirkninger: '', annet: '' };
  S.loggView = view;
  render();
}

function goKlinikk(view) {
  if (view === 'new') S.kf = { dato: today(), kl: '', kontakt: '', anmerkning: '' };
  S.klinikkView = view;
  render();
}

function openLoggDetail(id) {
  S.loggSel = S.entries.find(e => e.id === id);
  S.loggView = 'detail';
  render();
}

function openKlinikkDetail(id) {
  S.klinikkSel = S.visits.find(v => v.id === id);
  S.klinikkView = 'detail';
  render();
}

// ─── Form updates (no re-render) ───
function lf(k, v) { S.lf[k] = v; }
function kf(k, v) { S.kf[k] = v; }
function upPatient(k, v) { S.patient[k] = v; }
function upContacts(k, v) { S.contacts[k] = v; }
function upDiag(k, v) { S.diag[k] = v; }

function setEnhet(val) { S.lf.enhet = val; render(); }

// ─── Save / delete ───
function saveEntry() {
  if (!S.lf.dato || !S.lf.dose) return;
  S.entries.unshift({ ...S.lf, id: genId() });
  store.set('infdag-entries', S.entries);
  goLogg('list');
}

function delEntry(id) {
  if (!confirm('Slett denne registreringen?')) return;
  S.entries = S.entries.filter(e => e.id !== id);
  store.set('infdag-entries', S.entries);
  S.loggSel = null;
  goLogg('list');
}

function saveVisit() {
  if (!S.kf.dato) return;
  S.visits.unshift({ ...S.kf, id: genId() });
  store.set('infdag-visits', S.visits);
  goKlinikk('list');
}

function delVisit(id) {
  if (!confirm('Slett dette besøket?')) return;
  S.visits = S.visits.filter(v => v.id !== id);
  store.set('infdag-visits', S.visits);
  S.klinikkSel = null;
  goKlinikk('list');
}

function saveInfo() {
  store.set('infdag-patient',  S.patient);
  store.set('infdag-contacts', S.contacts);
  store.set('infdag-diag',     S.diag);
  const btn = document.getElementById('save-info-btn');
  if (btn) {
    btn.textContent = '✓ Lagret';
    btn.classList.replace('navy', 'green');
    setTimeout(() => { btn.textContent = 'Lagre'; btn.classList.replace('green', 'navy'); }, 2000);
  }
}


// ─── Export ───
function exportData() {
  const p = S.patient, c = S.contacts, d = S.diag;
  const row = (label, val) => val
    ? `<tr><td style="color:#6b7280;padding:5px 0;font-size:13px;width:45%;vertical-align:top">${label}</td><td style="padding:5px 0;font-size:13px;font-weight:500">${val}</td></tr>`
    : '';
  const section = (title, html) =>
    `<div style="margin-bottom:24px">
      <div style="font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-bottom:6px;border-bottom:1.5px solid #1B3A5C">${title}</div>
      ${html}
    </div>`;
  const logRows = S.entries.map(e =>
    `<tr style="border-bottom:0.5px solid #e5e7eb">
      <td style="padding:8px 6px;font-size:13px">${fmtDate(e.dato)}</td>
      <td style="padding:8px 6px;font-size:13px">${esc(e.dose)} ${esc(e.enhet)}</td>
      <td style="padding:8px 6px;font-size:13px">${esc(e.lot)||'—'}</td>
      <td style="padding:8px 6px;font-size:13px;color:${e.bivirkninger?'#E8192C':'inherit'}">${esc(e.bivirkninger)||'—'}</td>
    </tr>`).join('');
  const visitRows = S.visits.map(v =>
    `<tr style="border-bottom:0.5px solid #e5e7eb">
      <td style="padding:8px 6px;font-size:13px">${fmtDate(v.dato)}${v.kl ? ' kl. '+esc(v.kl) : ''}</td>
      <td style="padding:8px 6px;font-size:13px">${esc(v.kontakt)||'—'}</td>
      <td style="padding:8px 6px;font-size:13px">${esc(v.anmerkning)||'—'}</td>
    </tr>`).join('');

  const dateStr = new Date().toLocaleDateString('nb-NO',{day:'2-digit',month:'2-digit',year:'numeric'});
  const entryCount = S.entries.length;
  const visitCount = S.visits.length;

  const infoTable = `<table>
    ${row('Navn', p.navn)}
    ${row('Personnummer', p.personnummer)}
    ${row('År', p.ar)}
    ${row('Lege', c.lege)}
    ${row('Sykepleier', c.sykepleier)}
    ${row('Diagnose', d.diagnose)}
    ${row('Dose', d.doseG ? d.doseG+' g' : '')}
    ${row('Doseintervall', d.doseIntervall ? d.doseIntervall+' ganger/uke' : '')}
    ${row('Dose (ml)', d.doseMl ? d.doseMl+' ml' : '')}
    ${row('Dose/inf.sted', d.dosePerSted ? d.dosePerSted+' ml' : '')}
    ${row('Andre legemidler', d.andreLeg)}
    ${row('Overfølsomhet', d.overfol)}
    ${row('Annet', d.annet)}
  </table>`;

  const logSection = entryCount > 0 ? section('Logbok – infusjoner ('+entryCount+')',
    `<table><thead><tr>
      <th style="text-align:left;font-size:12px;color:#6b7280;padding:6px;background:#f2f4f7">Dato</th>
      <th style="text-align:left;font-size:12px;color:#6b7280;padding:6px;background:#f2f4f7">Dose</th>
      <th style="text-align:left;font-size:12px;color:#6b7280;padding:6px;background:#f2f4f7">Batchnr. (LOT)</th>
      <th style="text-align:left;font-size:12px;color:#6b7280;padding:6px;background:#f2f4f7">Bivirkninger</th>
    </tr></thead><tbody>${logRows}</tbody></table>`) : '';

  const visitSection = visitCount > 0 ? section('Klinikkbesøk ('+visitCount+')',
    `<table><thead><tr>
      <th style="text-align:left;font-size:12px;color:#6b7280;padding:6px;background:#f2f4f7">Dato/tid</th>
      <th style="text-align:left;font-size:12px;color:#6b7280;padding:6px;background:#f2f4f7">Lege/sykepleier</th>
      <th style="text-align:left;font-size:12px;color:#6b7280;padding:6px;background:#f2f4f7">Anmerkninger</th>
    </tr></thead><tbody>${visitRows}</tbody></table>`) : '';

  const html = `<!DOCTYPE html>
<html lang="no"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Infusjonsdagbok – ${esc(p.navn)||'Eksport'}</title>
<style>
  body{font-family:-apple-system,sans-serif;max-width:680px;margin:0 auto;padding:24px 20px 60px;color:#1a1a1a}
  @media print{body{padding:0}.no-print{display:none!important}}
</style></head><body>
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid #1B3A5C">
  <div>
    <div style="font-size:20px;font-weight:700;color:#1B3A5C">Infusjonsdagbok</div>
    <div style="font-size:13px;color:#6b7280;margin-top:2px">Subkutan immunglobulinbehandling</div>
  </div>
  <div style="background:#E8192C;color:white;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px">SCIG</div>
</div>
${section('Pasientinformasjon', infoTable)}
${logSection}
${visitSection}
<div style="margin-top:40px;font-size:11px;color:#9ca3af;border-top:0.5px solid #e5e7eb;padding-top:12px">
  Eksportert ${dateStr} · CSL Behring Infusjonsdagbok SCIG
</div>
<div class="no-print" style="margin-top:28px;text-align:center">
  <button onclick="window.print()" style="background:#1B3A5C;color:white;border:none;padding:13px 32px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer">
    Skriv ut / Lagre som PDF
  </button>
</div>
</body></html>`;

  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'infusjonsdagbok' + (p.navn ? '-'+p.navn.replace(/\s+/g,'-').toLowerCase() : '') + '.html';
  a.click();
  URL.revokeObjectURL(url);
}

// ─── Boot ───
render();
</script>
</body>
</html>
